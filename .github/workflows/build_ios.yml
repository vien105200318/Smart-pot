name: Flutter iOS Build (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

        
      - name: 🆙 Update iOS Deployment Target
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj  

      # Build iOS với cờ --release
      - name: 🛠️ Build iOS App
        run: flutter build ios --release --no-codesign

      # Kiểm tra và đóng gói
      - name: 📦 Package into Unsigned IPA
        run: |
          mkdir -p Payload
          # Tìm file .app trong thư mục build để copy cho chính xác
          APP_PATH=$(find build/ios -name "*.app" | head -n 1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -qr smart_pot_unsigned.ipa Payload

      - name: 🚀 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-pot-ios-unsigned
          path: smart_pot_unsigned.ipa
          retention-days: 7