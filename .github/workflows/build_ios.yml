name: Flutter iOS CI/CD

# Workflow sẽ tự động chạy mỗi khi bạn push code lên nhánh 'main'
on:
  push:
    branches:
      - main
  workflow_dispatch: # Nút bấm thủ công trên Github để chạy khi cần

jobs:
  build-ios:
    name: Build iOS Application
    # Bắt buộc phải dùng máy chủ macOS của GitHub để build đồ Apple
    runs-on: macos-latest

    steps:
      # 1. Kéo code từ repository của bạn về máy chủ GitHub
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Flutter
      - name: ⚙️ Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Có thể chỉ định chính xác phiên bản Flutter bạn đang dùng, ví dụ:
          # flutter-version: '3.19.0'

      # 3. Cài đặt các thư viện (packages)
      - name: 📦 Install dependencies
        run: flutter pub get

      # 4. Tùy chọn A: Build kiểm tra lỗi (Dành cho tài khoản miễn phí)
      # Lệnh này sẽ build ra file .app (không cài được lên iPhone thật) nhưng giúp đảm bảo code không lỗi
      - name: 🛠️ Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

