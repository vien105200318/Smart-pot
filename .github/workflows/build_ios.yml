name: Flutter iOS Build (Unsigned IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

      # Build ra file .app dành cho thiết bị thật (iphoneos)
      # --no-codesign là chìa khóa để build mà không cần tài khoản Apple
      - name: 🛠️ Build iOS App
        run: flutter build ios --release --no-codesign --config-only

      # Bước quan trọng: Đóng gói theo cấu trúc Payload của iOS
      # App iOS thực chất là một thư mục .app, ta cần đặt nó trong thư mục 'Payload' rồi nén lại
      - name: 📦 Package into Unsigned IPA
        run: |
          mkdir -p Payload
          # Lưu ý: Runner.app là tên mặc định của Flutter Project
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr smart_pot_unsigned.ipa Payload

      - name: 🚀 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-pot-ios-unsigned
          path: smart_pot_unsigned.ipa
          retention-days: 7